name: build-and-deploy

on:
  schedule:
    # 週一~週五 台北 21:30 (= UTC 13:30), 收盤後 FinLab 還原價 etl 已更新
    - cron: '30 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # 保存 finlab 資料快取: 有快取時 finlab 只下載增量 delta 併入本地,
      # 沒快取才會全量下載 (~200MB)。每次 run 都存新 key, restore 撈最新。
      - uses: actions/cache@v4
        with:
          path: finlab_db
          key: finlab-db-${{ github.run_id }}
          restore-keys: |
            finlab-db-

      - name: Build dashboard
        env:
          FINLAB_API_TOKEN: ${{ secrets.FINLAB_API_TOKEN }}
          FINLAB_DB_DIR: ${{ github.workspace }}/finlab_db
        run: uv run --python 3.12 --with finlab python build_dashboard.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
